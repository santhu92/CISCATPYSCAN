- id: LNX-001
  platform: linux
  description: Ensure password max days <= 90
  command: "grep PASS_MAX_DAYS /etc/login.defs"
  expected: "<=90"
  severity: HIGH

- id: WIN-001
  platform: windows
  description: Minimum password length >= 14
  command: "(net accounts)"
  expected: ">=14"
  severity: HIGH

- id: WIN-002
  platform: windows
  description: Account lockout threshold
  command: net accounts
  expected: "Lockout threshold"
  severity: Medium

- id: WIN-003
  platform: windows
  description: Firewall enabled
  command: netsh advfirewall show allprofiles
  expected: "State ON"
  severity: High

- id: WIN-004
  platform: windows
  description: Windows Defender running
  command: sc query WinDefend
  expected: "RUNNING"
  severity: High

- id: WIN-005
  platform: windows
  description: Ensure Guest account is disabled
  command: net user guest
  expected: "Account active               No"
  severity: High

- id: WIN-006
  platform: windows
  description: Ensure SMBv1 is disabled
  command: Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol
  expected: "Disabled"
  severity: High

- id: WIN-007
  platform: windows
  description: Ensure Remote Desktop requires Network Level Authentication
  command: reg query "HKLM\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"
  expected: "UserAuthentication    REG_DWORD    0x1"
  severity: Medium

